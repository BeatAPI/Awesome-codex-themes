name: Theme proposal
description: Propose a theme package whose assets you have the necessary rights to distribute.
title: "[Theme]: "
labels: [theme, needs-review]
body:
  - type: input
    id: name
    attributes:
      label: Theme name and slug
      placeholder: My Theme / my-theme
    validations:
      required: true
  - type: textarea
    id: concept
    attributes:
      label: Visual concept
      description: Describe the mood, palette, and how it differs from existing themes.
    validations:
      required: true
  - type: dropdown
    id: provenance
    attributes:
      label: Artwork provenance
      options:
        - Original work created by me
        - Commercially redistributable work with documented license
        - Character or branded work with documented distribution rights
    validations:
      required: true
  - type: input
    id: compatibility
    attributes:
      label: Codex version tested
      placeholder: 26.707.72221
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Submission checks
      options:
        - label: I have the necessary rights to publish and redistribute every included asset and derivative under the declared terms.
          required: true
        - label: The CSS preserves native controls, focus, pointer, and keyboard interaction.
          required: true
        - label: I will include an ASSET_LICENSE.md and start with experimental status.
          required: true
